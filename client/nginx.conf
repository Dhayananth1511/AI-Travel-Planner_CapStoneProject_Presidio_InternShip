# ============================================================
# client/nginx.conf — Nginx config for React SPA
#
# WHY THIS IS NEEDED:
# React Router uses client-side routing. When a user visits
# /dashboard directly, Nginx looks for a file called "dashboard"
# on disk — it doesn't exist, so it returns 404.
# The "try_files" directive tells Nginx: if the file doesn't exist,
# always serve index.html so React Router can handle the route.
# ============================================================

server {
    # Listen on port 80 (CloudFront/EC2 forwards traffic here)
    listen 80;
    server_name _;

    # Where the built React files are (matches Dockerfile COPY destination)
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression — reduces response size, speeds up page loads
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json;
    gzip_min_length 1000;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Cache static assets aggressively (JS/CSS have hashed filenames from Vite)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — ALL routes serve index.html
    # React Router handles the actual routing on the client side
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint for load balancers / monitoring
    location /nginx-health {
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
