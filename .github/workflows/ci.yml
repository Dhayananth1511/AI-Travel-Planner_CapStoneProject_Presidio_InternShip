# ============================================================
# .github/workflows/ci.yml — CI Pipeline
#
# WHEN: Runs on every Pull Request targeting the main branch
# WHY:  Catches bugs BEFORE they get merged into production
#
# Jobs:
#   1. lint-and-test → TypeScript check + npm audit + build both apps
#   2. docker-build  → Verify Docker images build without errors
# ============================================================

name: CI Pipeline

on:
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Code Quality + Build ──────────────────────────
  lint-and-test:
    name: Lint, Type-Check & Build
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the code from the PR branch
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Node.js 20 with npm cache for faster installs
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      # ── Server (Backend) Checks ──────────────────────────

      - name: Install server dependencies
        run: cd server && npm ci

      - name: TypeScript type check (server)
        run: cd server && npx tsc --noEmit
        # Catches type errors before runtime — breaks CI if any type is wrong

      - name: Security audit (server)
        run: cd server && npm audit --audit-level=high
        # Fails if any HIGH or CRITICAL vulnerability is found in dependencies
        continue-on-error: true  # Don't fail entire CI on audit warnings

      # ── Client (Frontend) Checks ─────────────────────────

      - name: Install client dependencies
        run: cd client && npm ci

      - name: TypeScript type check (client)
        run: cd client && npx tsc --noEmit

      - name: Build frontend (production bundle)
        run: cd client && npm run build
        # Verifies Vite can produce the production bundle without errors

  # ── Job 2: Docker Image Build Test ───────────────────────
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: lint-and-test   # Only runs if Job 1 passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build API Docker image (test only — not pushed)
        run: |
          docker build ./server \
            -t travel-planner-api:ci-test \
            --no-cache
        # Full multi-stage build — verifies Dockerfile syntax AND that
        # TypeScript compiles correctly inside the container

      - name: Build Frontend Docker image (test only — not pushed)
        run: |
          docker build ./client \
            -t travel-planner-client:ci-test \
            --no-cache
        # Verifies Vite build + Nginx config works inside the container

      - name: Verify API image has correct entrypoint
        run: |
          docker inspect travel-planner-api:ci-test | \
          grep -q "dist/index.js" && echo "✅ Entrypoint OK" || \
          (echo "❌ Entrypoint missing" && exit 1)
